<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVIDIA Driver Issue Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>NVIDIA Driver Issue Tracker</h1>
            <p>Tracking known issues and fixes across driver versions</p>
        </div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search issues, versions, or status...">
        </div>

        <div id="driver-container">
            <!-- Driver cards will be injected here -->
        </div>

        <div class="pagination-container">
            <button id="load-more-btn">Load More</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
